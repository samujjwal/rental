name: Breaking Change Detection

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  breaking-change-detection:
    name: API Breaking Change Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Build API
        run: cd apps/api && pnpm run build

      - name: Run contract tests
        run: cd apps/api && pnpm run test:contract
        env:
          NODE_ENV: test

      - name: Run OpenAPI validation
        run: cd apps/api && pnpm run test:contract-openapi
        env:
          NODE_ENV: test

      - name: Detect breaking changes
        run: cd apps/api && pnpm run test:contract-drift
        env:
          NODE_ENV: test

      - name: Upload breaking change report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breaking-change-report
          path: apps/api/contract-drift-report.json
          retention-days: 30

      - name: Comment breaking changes on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('apps/api/contract-drift-report.json', 'utf8'));
              if (report.breakingChanges && report.breakingChanges.length > 0) {
                const comment = `## ⚠️ Breaking Changes Detected\n\n${report.breakingChanges.map(change => `- **${change.endpoint}**: ${change.description}`).join('\n')}\n\nPlease review these changes before merging.`;
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not parse breaking change report:', error.message);
            }
