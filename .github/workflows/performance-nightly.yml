name: Performance Tests (Nightly)

on:
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC daily
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  performance-tests:
    name: K6 Performance Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Build API
        run: cd apps/api && pnpm run build

      - name: Start API server
        run: |
          cd apps/api
          pnpm run start:prod &
          sleep 30

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run K6 performance tests
        run: k6 run tests/load/performance-load.spec.ts
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
          EMAIL_ENABLED: 'false'
          JWT_SECRET: test-jwt-secret-for-ci-only-not-for-production

      - name: Upload K6 performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: k6-results.json
          retention-days: 30

      - name: Comment performance results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('k6-results.json', 'utf8'));
              const comment = `## Performance Test Results\n\n- **Total Requests**: ${results.metrics.http_reqs?.values?.count || 'N/A'}\n- **Failed Requests**: ${results.metrics.http_req_failed?.values?.passes || 'N/A'}\n- **Average Response Time**: ${results.metrics.http_req_duration?.values?.avg || 'N/A'}ms\n- **95th Percentile**: ${results.metrics.http_req_duration?.values?.['p(95)'] || 'N/A'}ms\n- **Max Response Time**: ${results.metrics.http_req_duration?.values?.max || 'N/A'}ms`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not parse K6 results:', error.message);
            }
