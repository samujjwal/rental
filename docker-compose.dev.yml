version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rental-postgres
    environment:
      POSTGRES_USER: rental_user
      POSTGRES_PASSWORD: rental_password
      POSTGRES_DB: rental_portal
    ports:
      - "3432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rental-redis
    ports:
      - "3479:6379"
    volumes:
      - redis_data:/data

  # NOTE: The active search stack is PostgreSQL full-text search + pgvector semantic ranking.
  # OpenSearch (@opensearch-project/opensearch) is available in the dependency tree as the
  # Apache-2.0 licensed successor to Elasticsearch for any future dedicated index features.
  # See apps/api/src/modules/search/ for the current implementation.

volumes:
  postgres_data:
  redis_data:
