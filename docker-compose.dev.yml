version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${POSTGRES_CONTAINER:-rental-postgres-dev}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_password}
      POSTGRES_DB: ${POSTGRES_DB:-rental_portal}
    ports:
      - "${POSTGRES_PORT:-3432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rental_user} -d ${POSTGRES_DB:-rental_portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER:-rental-redis-dev}
    ports:
      - "${REDIS_PORT:-3479}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NOTE: The active search stack is PostgreSQL full-text search + pgvector semantic ranking.
  # OpenSearch (@opensearch-project/opensearch) is available in the dependency tree as the
  # Apache-2.0 licensed successor to Elasticsearch for any future dedicated index features.
  # See apps/api/src/modules/search/ for the current implementation.

volumes:
  postgres_data:
  redis_data:
