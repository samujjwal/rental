services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ${API_CONTAINER:-rental-api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com,https://www.yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
      AWS_ACCESS_KEY_ID: ${DO_SPACES_KEY}
      AWS_SECRET_ACCESS_KEY: ${DO_SPACES_SECRET}
      AWS_REGION: ${DO_SPACES_REGION:-nyc3}
      AWS_S3_BUCKET: ${DO_SPACES_BUCKET}
      AWS_S3_ENDPOINT: ${DO_SPACES_ENDPOINT}
      CDN_URL: ${DO_SPACES_CDN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    expose:
      - "${API_PORT:-3000}"
    deploy:
      resources:
        limits:
          cpus: '${API_CPU_LIMIT:-1.0}'
          memory: ${API_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${API_CPU_RESERVATION:-0.25}'
          memory: ${API_MEMORY_RESERVATION:-256M}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${API_PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: ${WEB_CONTAINER:-rental-web}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "${WEB_PORT:-3000}"
    deploy:
      resources:
        limits:
          cpus: '${WEB_CPU_LIMIT:-0.5}'
          memory: ${WEB_MEMORY_LIMIT:-256M}
        reservations:
          cpus: '${WEB_CPU_RESERVATION:-0.1}'
          memory: ${WEB_MEMORY_RESERVATION:-128M}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${WEB_PORT:-3000}"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

  nginx:
    image: nginx:alpine
    container_name: ${NGINX_CONTAINER:-rental-nginx}
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
