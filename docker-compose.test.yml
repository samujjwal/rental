version: '3.8'

services:
  # MinIO S3-Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: rental-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default bucket
  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/test-bucket || true &&
      mc policy set public local/test-bucket || true
      exit 0
      "

  # Ceph S3-Compatible Storage (alternative)
  ceph:
    image: ceph/daemon:latest
    container_name: rental-ceph
    privileged: true
    ports:
      - "7480:7480"
    environment:
      - RGW_FRONTEND_TYPE=beast
      - DEBUG=verbose
    volumes:
      - ceph_data:/var/lib/ceph
    command: rgw
    profiles:
      - ceph  # Only start when explicitly requested

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rental-mailhog
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI
    environment:
      MH_UI_BIND_ADDR: 0.0.0.0:8025
      MH_SMTP_BIND_ADDR: 0.0.0.0:1025

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: rental-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # PostgreSQL test database
  postgres:
    image: postgres:15-alpine
    container_name: rental-postgres-test
    ports:
      - "5433:5432"  # Different port to avoid conflict
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: rental_test
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  minio_data:
  ceph_data:
  redis_data:
  postgres_data:
