version: '3.8'

services:
  # MinIO S3-Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER:-rental-minio-test}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default bucket
  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb local/test-bucket || true &&
      mc policy set public local/test-bucket || true
      exit 0
      "

  # Ceph S3-Compatible Storage (alternative)
  ceph:
    image: ceph/daemon:latest
    container_name: ${CEPH_CONTAINER:-rental-ceph-test}
    privileged: true
    ports:
      - "${CEPH_PORT:-7480}:7480"
    environment:
      - RGW_FRONTEND_TYPE=beast
      - DEBUG=verbose
    volumes:
      - ceph_data:/var/lib/ceph
    command: rgw
    profiles:
      - ceph  # Only start when explicitly requested

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ${MAILHOG_CONTAINER:-rental-mailhog-test}
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"  # SMTP port
      - "${MAILHOG_PORT:-8025}:8025"  # Web UI
    environment:
      MH_UI_BIND_ADDR: 0.0.0.0:${MAILHOG_PORT:-8025}
      MH_SMTP_BIND_ADDR: 0.0.0.0:${MAILHOG_SMTP_PORT:-1025}

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER:-rental-redis-test}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL test database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${POSTGRES_CONTAINER:-rental-postgres-test}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"  # Different port to avoid conflict
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: ${POSTGRES_DB:-rental_test}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test} -d ${POSTGRES_DB:-rental_test}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  ceph_data:
  redis_data:
  postgres_data:
