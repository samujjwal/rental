# ============================================================================
# Auth Login Flow — E2E Maestro Test
# Validates the sign-in flow from the login screen through to the home tab.
# ============================================================================
appId: com.gharbatai.mobile

---

- launchApp:
    clearState: true

# 1. App starts on login screen (unauthenticated)
- assertVisible: "Sign In"

# 2. Tap email field and enter credentials
- tapOn:
    id: "email-input"
- inputText: "renter@test.com"

- tapOn:
    id: "password-input"
- inputText: "Test123!@#"

# 3. Tap Sign In button
- tapOn:
    text: "Sign In"

# 4. Wait for navigation to home/main screen
- assertVisible:
    text: "Home"

# 5. Verify bottom tabs are visible (authenticated state)
- assertVisible: "Search"
- assertVisible: "Bookings"
- assertVisible: "Profile"
