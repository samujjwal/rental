# ============================================================================
# Booking Flow — E2E Maestro Test
# Validates the booking creation flow from listing detail to booking confirmation.
# ============================================================================
appId: com.gharbatai.rental

---

# Precondition: login first
- runFlow: auth-login.yaml

# 1. Navigate to Home tab (default after login)
- assertVisible:
    text: "Home"
    timeout: 5000

# 2. Tap on a featured/recent listing
- tapOn:
    id: "listing-card"
    index: 0
    optional: true

# Fallback: go to Search and find a listing
- tapOn:
    text: "Search"
    optional: true
- tapOn:
    id: "listing-card"
    index: 0
    optional: true

# 3. On listing detail, tap Book/Request button
- assertVisible:
    text: "Book|Request"
    timeout: 8000
- tapOn:
    text: "Book|Request"

# 4. Booking flow screen — select dates
- assertVisible:
    text: "Select Dates|Choose Dates|Start Date"
    timeout: 8000

# 5. Tap start date (pick a date ~5 days from now)
- tapOn:
    id: "start-date-input"
    optional: true

# 6. Tap end date
- tapOn:
    id: "end-date-input"
    optional: true

# 7. Verify pricing breakdown is shown
- assertVisible:
    text: "Total|Price|NPR|Rs"
    optional: true
    timeout: 5000

# 8. Confirm booking
- tapOn:
    text: "Confirm|Book Now|Request Booking|Submit"
    optional: true

# 9. Should see success or pending status
- assertVisible:
    text: "Pending|Confirmed|Success|Booked"
    timeout: 10000
    optional: true
