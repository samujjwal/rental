# ============================================================================
# Booking Flow — E2E Maestro Test
# Validates the booking creation flow from listing detail to booking confirmation.
# ============================================================================
appId: com.gharbatai.mobile

---

# Precondition: login first
- runFlow: auth-login.yaml

# 1. Navigate to Search and open a listing
- tapOn:
    text: "Search"
    optional: true
- tapOn:
    id: "listing-card"
    index: 0

# 2. On listing detail, tap the booking CTA
- assertVisible:
    text: "Book now|Book|Request"
- tapOn:
    text: "Book now|Book|Request"

# 3. Booking flow screen loads
- assertVisible:
    text: "Book a Listing|Select start date|Start Date"

# 4. Verify booking actions are present
- assertVisible:
    text: "Check availability|Create booking"
