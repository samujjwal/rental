# ============================================================================
# Owner Manage Booking Requests Flow — E2E Maestro Test
# Validates owner viewing and managing booking requests (approve/reject).
# ============================================================================
appId: com.gharbatai.mobile

---

# Precondition: login as owner
- runFlow: auth-login.yaml

# 1. Navigate to Profile
- tapOn: "Profile"

# 2. Tap on My Listings or Owner Dashboard
- tapOn:
    text: "My Listings|Dashboard|Owner Portal"
    optional: true

# 3. Tap on a listing
- tapOn:
    id: "listing-card"
    index: 0

# 4. Navigate to Booking Requests
- tapOn:
    text: "Booking requests|Requests|Bookings"
    optional: true

# 5. Verify booking requests list loads
- assertVisible:
    text: "Requests|No requests|Pending"

# 6. Tap on a pending booking request
- tapOn:
    id: "request-card"
    index: 0
    optional: true

# 7. View booking details
- assertVisible:
    text: "Dates|Guest|Price"

# 8. Approve the booking
- tapOn:
    text: "Approve|Accept"
    optional: true

# 9. Confirm approval
- tapOn:
    text: "Confirm|Yes"
    optional: true

# 10. Verify booking status updated
- assertVisible:
    text: "Approved|Confirmed"
    optional: true

# 11. Test rejecting a booking (if another request exists)
- back
- tapOn:
    id: "request-card"
    index: 1
    optional: true
- tapOn:
    text: "Reject|Decline"
    optional: true
- tapOn:
    text: "Confirm|Yes"
    optional: true
- assertVisible:
    text: "Rejected|Declined"
    optional: true
