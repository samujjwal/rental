# ============================================================================
# Auth Signup Flow — E2E Maestro Test
# Validates the registration flow from signup screen to successful account creation.
# ============================================================================
appId: com.gharbatai.mobile

---

- launchApp:
    clearState: true

# 1. App starts on login screen
- assertVisible: "Sign In"

# 2. Navigate to signup
- tapOn:
    text: "Create an account"

# 3. Fill in registration form
- assertVisible: "Create account"

- tapOn:
    id: "firstName-input"
- inputText: "E2E"

- tapOn:
    id: "lastName-input"
- inputText: "TestUser"

- tapOn:
    id: "email-input"
- inputText: ${'e2e.signup.' + Date.now() + '@test.com'}

- tapOn:
    id: "password-input"
- inputText: "E2eTest123!@#"

# 4. Submit signup
- tapOn:
    text: "Sign Up"

# 5. Should navigate to home or verification screen
- assertVisible:
    text: "Home|Search|Profile|Verify|Welcome"
