# ============================================================================
# Deep Linking Flow — E2E Maestro Test
# Validates deep linking to listings, bookings, and profile.
# ============================================================================
appId: com.gharbatai.mobile

---

# 1. Launch app
- launchApp:
    clearState: false
    clearKeychain: false

# 2. Simulate deep link to listing
- runScript:
    - name: Simulate deep link
      command: "adb shell am start -W -a android.intent.action.VIEW -d \"gharbatai://listings/test-listing-1\" com.gharbatai.mobile"
      optional: true

# Alternative: Use Maestro's openLink if available
# - openLink: "gharbatai://listings/test-listing-1"

# 3. Verify app opens to listing detail
- assertVisible:
    text: "Details|Book|Price"
    optional: true

# 4. Simulate deep link to booking
- runScript:
    - name: Simulate deep link to booking
      command: "adb shell am start -W -a android.intent.action.VIEW -d \"gharbatai://bookings/test-booking-1\" com.gharbatai.mobile"
      optional: true

# 5. Verify app opens to booking detail
- assertVisible:
    text: "Booking|Status|Details"
    optional: true

# 6. Simulate deep link to profile
- runScript:
    - name: Simulate deep link to profile
      command: "adb shell am start -W -a android.intent.action.VIEW -d \"gharbatai://profile/user-1\" com.gharbatai.mobile"
      optional: true

# 7. Verify app opens to profile
- assertVisible:
    text: "Profile|Account"
    optional: true
