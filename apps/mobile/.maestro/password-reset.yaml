# ============================================================================
# Password Reset Flow — E2E Maestro Test
# Validates password reset request and flow.
# ============================================================================
appId: com.gharbatai.mobile

---

# 1. Launch app and navigate to login
- launchApp:
    clearState: true

# 2. Verify login screen
- assertVisible:
    text: "Sign In"

# 3. Tap on Forgot Password
- tapOn:
    text: "Forgot password|Reset password"

# 4. Verify reset screen loads
- assertVisible:
    text: "Reset password|Email"

# 5. Enter email for reset
- inputText: "renter@test.com"
    id: "email-input"

# 6. Submit reset request
- tapOn:
    text: "Send|Reset|Submit"

# 7. Verify success message
- assertVisible:
    text: "Email sent|Check your email|Reset link sent"

# 8. Navigate back to login
- tapOn:
    text: "Back|Sign In"
    optional: true

# 9. Verify login screen
- assertVisible:
    text: "Sign In"
